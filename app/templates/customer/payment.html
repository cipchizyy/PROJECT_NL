<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment — Next Level Rent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- ─── NAV ─────────────────────────────────────────────── -->
  <header>
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <a href="choose-room.html" class="nav__logo">NEXT LEVEL</a>

      <ul class="nav__links">
        <li><a href="#">Lounge</a></li>
        <li><a href="choose-room.html">Booking</a></li>
        <li><a href="#">Support</a></li>
      </ul>

      <div class="nav__right">
        <button class="nav__icon" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
        <div class="nav__avatar" role="img" aria-label="User avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>
    </nav>
  </header>

  <!-- ─── MAIN ─────────────────────────────────────────────── -->
  <main class="page">
    <div class="container">

      <div class="payment-layout">

        <!-- LEFT: reservation + method -->
        <div>

          <!-- Reservation Summary -->
          <div class="pay-section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            Reservation Summary
          </div>

          <div class="res-card">
            <div class="res-card__thumb" id="pay-room-emoji">🖥️</div>
            <div class="res-card__body">
              <div class="res-card__type" id="pay-room-type">REGULAR</div>
              <div class="res-card__id"   id="pay-room-id">R-01</div>
              <div class="res-card__meta">
                <div class="res-card__meta-item">
                  <label>Date</label>
                  <span id="pay-date">Thu 26, Jun 2026</span>
                </div>
                <div class="res-card__meta-item">
                  <label>Time Slot</label>
                  <span id="pay-time">18:00 – 22:00</span>
                </div>
                <div class="res-card__meta-item">
                  <label>Duration</label>
                  <span id="pay-duration">4 Hours</span>
                </div>
              </div>
            </div>
          </div>

          <hr class="divider" />

          <!-- Payment Method -->
          <div class="pay-section-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="1" y="4" width="22" height="16" rx="2"/>
              <line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
            Payment Method
          </div>

          <div class="method-options" role="radiogroup" aria-label="Select payment method">

            <div class="method-opt" data-method="cash" role="radio" aria-checked="false" tabindex="0">
              <div class="method-opt__icon">
                <!-- cash icon -->
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <rect x="1" y="4" width="22" height="16" rx="2"/>
                  <line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
              </div>
              <div class="method-opt__name">Cash</div>
              <div class="method-opt__sub">Bayar di kasir</div>
            </div>

            <div class="method-opt active" data-method="qris" role="radio" aria-checked="true" tabindex="0">
              <div class="method-opt__icon" style="color:var(--pink)">
                <!-- scan / qr icon -->
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                  <rect x="3" y="14" width="7" height="7"/>
                  <path d="M14 14h3v3M17 17v3M20 14h1M14 17h.01M20 20h.01"/>
                </svg>
              </div>
              <div class="method-opt__name">Cashless</div>
              <div class="method-opt__sub">QRIS</div>
            </div>

          </div>

          <!-- QRIS detail row -->
          <div class="qris-box" id="qris-box">
            <div class="qris-box__left">
              <span class="qris-pill">QRIS</span>
              <span>Scan QRIS code</span>
            </div>
            <button class="qris-box__change">Change</button>
          </div>

        </div><!-- /left col -->

        <!-- RIGHT: summary panel -->
        <aside class="summary-panel" aria-label="Payment summary">
          <h2 class="summary-panel__title">Total Due</h2>

          <div class="summary-row">
            <span id="summary-desc">4 Hours @ 10,000/hr</span>
            <span id="summary-sub">40,000</span>
          </div>

          <hr class="divider" />

          <div class="summary-panel__total-row">
            <span class="summary-panel__total-label">Total</span>
            <span class="summary-panel__total" id="summary-total">IDR 40,000</span>
          </div>

          <button class="btn-book" id="btn-book">
            Booking
            <!-- lightning icon -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
                 aria-hidden="true" style="display:inline;margin-left:6px">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </button>
        </aside>

      </div><!-- /payment-layout -->
    </div><!-- /container -->
  </main>

  <script src="../js/app.js"></script>
  <script src="shared.js"></script>
<script src="payment.js"></script>
</body>
</html>
