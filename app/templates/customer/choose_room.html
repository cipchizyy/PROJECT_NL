<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick Your Battle Station — Next Level Rent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- ─── NAV ─────────────────────────────────────────────── -->
  <header>
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <a href="choose-room.html" class="nav__logo" aria-label="Next Level Rent home">NEXT LEVEL</a>

      <ul class="nav__links">
        <li><a href="#">Lounge</a></li>
        <li><a href="choose-room.html" class="active">Booking</a></li>
        <li><a href="#">Support</a></li>
      </ul>

      <div class="nav__right">
        <button class="nav__icon" aria-label="Notifications">
          <!-- bell -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
        <button class="nav__icon" aria-label="Login">
          <!-- user -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <!-- ─── MAIN ─────────────────────────────────────────────── -->
  <main class="page page--with-cart">
    <div class="container">

      <!-- Section header -->
      <div class="section-header">
        <h1 class="section-header__title">Pick Your Battle Station</h1>
        <p class="section-header__sub">
          Whether you're grinding ranked, running customs, or just chilling with the squad.
        </p>
      </div>

      <!-- Two-column layout -->
      <div class="booking-layout">

        <!-- Env Sidebar -->
        <aside class="env-sidebar" aria-label="Environment filter">
          <p class="env-sidebar__label">Environments</p>
          <ul class="env-sidebar__list" role="list">

            <li>
              <button class="env-btn active" data-env="REGULAR" aria-pressed="true">
                <!-- monitor icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <rect x="2" y="3" width="20" height="14" rx="2"/>
                  <line x1="8" y1="21" x2="16" y2="21"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                Regular
              </button>
            </li>

            <li>
              <button class="env-btn" data-env="REGULAR PRO" aria-pressed="false">
                <!-- laptop icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <rect x="2" y="4" width="20" height="14" rx="2"/>
                  <line x1="2" y1="20" x2="22" y2="20"/>
                </svg>
                Regular Pro
              </button>
            </li>

            <li>
              <button class="env-btn" data-env="VIP" aria-pressed="false">
                <!-- crown icon -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M2 20h20M4 20l2-8 6 4 4-8 4 8 2 0"/>
                </svg>
                VIP
              </button>
            </li>

          </ul>
        </aside>

        <!-- Room Grid -->
        <section class="rooms-panel" aria-label="Available rooms">
          <div class="rooms-grid" id="rooms-grid" role="list">
            <!-- rendered by app.js -->
          </div>
        </section>

      </div><!-- /booking-layout -->
    </div><!-- /container -->
  </main>

  <!-- ─── CART BAR ──────────────────────────────────────────── -->
  <div class="cart-bar" id="cart-bar" role="status" aria-live="polite" aria-label="Cart summary">
    <div class="cart-bar__left">
      <div class="cart-bar__count">
        <!-- cart icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        1 Session
      </div>
      <div class="cart-bar__info">
        <span class="cart-bar__room-label" id="cart-room-label">—</span>
        <span class="cart-bar__room-detail" id="cart-room-detail">—</span>
      </div>
    </div>

    <div class="cart-bar__right">
      <div>
        <div class="cart-bar__total-label">Total Cost</div>
        <div class="cart-bar__total-amount" id="cart-total">0</div>
      </div>
      <button class="btn-payment" id="cart-payment-btn">Payment</button>
    </div>
  </div>

  <!-- ─── MODAL: CUSTOMIZE SESSION ───────────────────────────── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog"
       aria-modal="true" aria-labelledby="modal-heading">

    <div class="modal" tabindex="-1">

      <div class="modal__header">
        <div>
          <p class="modal__title" id="modal-heading">Customize your session</p>
          <p class="modal__room-tag" id="modal-room-tag">R-01 · Regular</p>
        </div>
        <button class="modal__close" id="modal-close" aria-label="Close modal">×</button>
      </div>

      <!-- Day -->
      <div class="modal__section">
        <p class="modal__label">1. Select Date</p>
        <div class="chip-row" id="modal-days" role="group" aria-label="Select date">
          <!-- rendered by app.js -->
        </div>
      </div>

      <!-- Duration -->
      <div class="modal__section">
        <p class="modal__label">2. Session Duration</p>
        <div class="chip-row" id="modal-durations" role="group" aria-label="Select duration">
          <!-- rendered by app.js -->
        </div>
      </div>

      <!-- Time -->
      <div class="modal__section">
        <p class="modal__label">3. Start Time</p>
        <div class="chip-grid" id="modal-times" role="group" aria-label="Select start time">
          <!-- rendered by app.js -->
        </div>
      </div>

      <button class="btn-confirm" id="modal-confirm">
        Confirm &amp; Add to GCard
      </button>

    </div><!-- /modal -->
  </div><!-- /modal-overlay -->

  <script src="../js/app.js"></script>
  <script src="shared.js"></script>
<script src="choose-room.js"></script>
<script src="add-to-cart.js"></script>
</body>
</html>
