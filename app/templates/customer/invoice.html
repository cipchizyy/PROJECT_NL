<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Receipt — Next Level Rent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- ─── NAV ─────────────────────────────────────────────── -->
  <header>
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <a href="choose-room.html" class="nav__logo">NEXT LEVEL</a>

      <ul class="nav__links">
        <li><a href="#">Lounge</a></li>
        <li><a href="choose-room.html">Booking</a></li>
        <li><a href="#">Support</a></li>
      </ul>

      <div class="nav__right">
        <button class="nav__icon" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </button>
        <div class="nav__avatar" role="img" aria-label="User avatar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>
    </nav>
  </header>

  <!-- ─── MAIN ─────────────────────────────────────────────── -->
  <main class="page">
    <div class="invoice-page" role="main">

      <h1 class="invoice-page__title">Digital Receipt</h1>

      <div class="verified-badge" aria-label="Transaction verified">
        <!-- check circle -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Transaction Verified
      </div>

      <!-- ─── Invoice Card ──────────────────────────────────── -->
      <div class="invoice-card" role="region" aria-label="Booking details">

        <div class="invoice-card__top">
          <div>
            <span class="invoice-card__label">Booking ID</span>
            <div class="invoice-card__id" id="inv-booking-id">#NL-9942</div>
          </div>
          <div class="paid-badge" aria-label="Payment status: Paid">
            <!-- dot -->
            <svg width="8" height="8" viewBox="0 0 8 8" fill="var(--green)" aria-hidden="true">
              <circle cx="4" cy="4" r="4"/>
            </svg>
            PAID
          </div>
        </div>

        <div class="invoice-card__meta">
          <div class="invoice-card__meta-item">
            <label>Station</label>
            <span id="inv-station">Regular Room R-01</span>
          </div>
          <div class="invoice-card__meta-item">
            <label>Date</label>
            <span id="inv-date">Jun 26, 2026</span>
          </div>
          <div class="invoice-card__meta-item">
            <label>Access Time</label>
            <span id="inv-time">18:00 — 22:00</span>
          </div>
          <div class="invoice-card__meta-item">
            <label>Duration</label>
            <span id="inv-duration">4 Hours</span>
          </div>
        </div>

        <p class="invoice-card__hint">
          Show this screen at the command center to initialize your session.
        </p>

      </div><!-- /invoice-card -->

      <!-- ─── Info banner ───────────────────────────────────── -->
      <div class="info-banner" role="note">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        Direkomendasikan datang 10 menit sebelum jadwal.
      </div>

      <!-- ─── Actions ───────────────────────────────────────── -->
      <button class="btn-download" id="btn-download" aria-label="Download PDF invoice">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download PDF Invoice
      </button>

      <button class="btn-back" id="btn-back">
        ← Back to Lounge
      </button>

    </div><!-- /invoice-page -->
  </main>

  <script src="../js/app.js"></script>
  <script src="shared.js"></script>
<script src="digital-invoice.js"></script>
</body>
</html>
