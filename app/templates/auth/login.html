<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Level Rent - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='../static/css/auth.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Next Level Logo" class="brand-logo">
            <h1 class="brand">NEXT LEVEL</h1>
            <p class="tagline">PREMIUM PLAY STATION</p>

            <div class="tabs">
                <button type="button" class="tab-btn active" data-tab="login">LOGIN</button>
                <button type="button" class="tab-btn" data-tab="signup">SIGN UP</button>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <!-- LOGIN FORM -->
            <form id="login-form" class="auth-form active" action="{{ url_for('auth.login') }}" method="POST">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@gmail.com" required>

                <label class="label-row">
                    <span>Passcode</span>
                    <a href="{{ url_for('auth.forgot_password_page') }}" class="forgot-link">Forgot?</a>
                </label>
<div class="password-wrapper">
    <input type="password" name="passcode" id="login-passcode" placeholder="••••••" required minlength="6">
    <button type="button" class="toggle-password-btn" data-target="login-passcode">
        <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none">
            <path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a21.6 21.6 0 015.06-6.06M9.9 4.24A10.4 10.4 0 0112 4c7 0 11 8 11 8a21.6 21.6 0 01-3.22 4.34"/>
            <path d="M14.12 14.12a3 3 0 11-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
    </button>
</div>

                <button type="submit" class="submit-btn">LOGIN</button>
            </form>

            <!-- SIGN UP FORM -->
            <form id="signup-form" class="auth-form" action="{{ url_for('auth.signup') }}" method="POST">
                <label>Name</label>
                <input type="text" name="name" placeholder="Nama lengkap" required>

                <label>Nomor Handphone</label>
                <input type="text" name="phone_number" placeholder="08xxxxxxxxxx" required>

                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@gmail.com" required>

                <label>Passcode</label>
<div class="password-wrapper">
    <input type="password" name="passcode" id="signup-passcode" placeholder="Minimal 6 karakter" required minlength="6">
    <button type="button" class="toggle-password-btn" data-target="signup-passcode">
        <svg class="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg class="icon-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="display:none">
            <path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a21.6 21.6 0 015.06-6.06M9.9 4.24A10.4 10.4 0 0112 4c7 0 11 8 11 8a21.6 21.6 0 01-3.22 4.34"/>
            <path d="M14.12 14.12a3 3 0 11-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
    </button>
</div>
                <button type="submit" class="submit-btn">SIGN UP</button>
            </form>

            <p class="contact-admin">
                Need technical support?
                <a href="https://wa.me/{{ config.ADMIN_CONTACT_WA }}" target="_blank" rel="noopener">Contact Admin</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
