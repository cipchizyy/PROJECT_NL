<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Reset Passcode - Next Level</title>
    <style>
        body {
            background: #0d0d12;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 60px 16px;
            margin: 0;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: #16161d;
            border-radius: 16px;
            padding: 32px;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: #c77dff;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            color: #8a8a9a;
            font-size: 13px;
            letter-spacing: 3px;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
        }
        input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            background: #1e1e27;
            border: 1px solid #2c2c38;
            border-radius: 10px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            background: linear-gradient(90deg, #c77dff, #9d4edd);
            border: none;
            border-radius: 10px;
            padding: 14px;
            color: #1a1a22;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #c77dff;
            text-decoration: none;
            font-size: 13px;
        }
        .flash {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .flash.info { background: #17303d; color: #7fd4ff; }
        .flash.danger { background: #3d1720; color: #ff8fa3; }
        .flash.success { background: #173d24; color: #7fffb0; }
        .flash.warning { background: #3d3417; color: #ffe27f; }
    </style>
</head>
<body>
    <div class="card">
        <h1>NEXT LEVEL</h1>
        <div class="subtitle">PREMIUM PLAY STATION</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
            <label for="passcode">Passcode Baru</label>
            <input type="password" id="passcode" name="passcode" placeholder="Minimal 6 karakter" required minlength="6">

            <label for="confirm_passcode">Konfirmasi Passcode</label>
            <input type="password" id="confirm_passcode" name="confirm_passcode" placeholder="Ulangi passcode baru" required minlength="6">

            <button type="submit">Simpan Passcode Baru</button>
        </form>

        <a class="back-link" href="{{ url_for('auth.login_page') }}">← Kembali ke Login</a>
    </div>
</body>
</html>
