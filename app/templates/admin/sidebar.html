<aside class="admin-sidebar">
    <div class="sidebar-top">
        <p class="sidebar-title">Dashboard Admin</p>
        <p class="sidebar-subtitle">Admin Hub</p>
    </div>

    <nav class="sidebar-nav">
        <a href="{{ url_for('admin.dashboard') }}" class="sidebar-link {{ 'active' if active_menu == 'dashboard' else '' }}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
            Dashboard
        </a>
        <a href="{{ url_for('admin.reservation_list') }}" class="sidebar-link {{ 'active' if active_menu == 'reservation' else '' }}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5"/></svg>
            Reservation
        </a>
        <a href="{{ url_for('admin.manage_room') }}" class="sidebar-link {{ 'active' if active_menu == 'manage_room' else '' }}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h18" stroke="currentColor" stroke-width="1.5"/></svg>
            Manage Room
        </a>
        <a href="{{ url_for('admin.manage_game') }}"
            class="sidebar-link {{ 'active' if active_menu == 'manage_game' else '' }}">
            Manage Game
        </a>
        <a href="{{ url_for('admin.create_sales_report') }}" class="sidebar-link {{ 'active' if active_menu == 'reports' else '' }}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 19V5M10 19V9M16 19v-7M22 19H2" stroke="currentColor" stroke-width="1.5"/></svg>
            Generate Reports
        </a>
    </nav>

    <div class="sidebar-bottom">
        <div class="sidebar-profile">
            <span class="sidebar-avatar">{{ current_user.name[0]|upper }}</span>
            <div>
                <p class="sidebar-profile-name">{{ current_user.name }}</p>
                <p class="sidebar-profile-role">ADMIN</p>
            </div>
        </div>
        <form action="{{ url_for('auth.logout') }}" method="POST" class="sidebar-logout-form">
            <button type="submit" class="sidebar-logout-btn" title="Logout">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
        </form>
    </div>
</aside>
